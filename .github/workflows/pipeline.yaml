steps:
  - name: "Checkout code"
    uses: actions/checkout@v4  # Use v4 for stability

  - name: "Debug: Show me the files"
    run: |
      echo "Current location:"
      pwd
      echo "Listing all files in the repository:"
      find . -maxdepth 2 -not -path '*/.*'

  - name: "Unit tests: javaVersion on Java code"
    working-directory: ./javaVersion
    run: |
      chmod +x gradlew
      ./gradlew test