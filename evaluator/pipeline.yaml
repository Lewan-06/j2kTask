    displayName: 'Build Stage'
    jobs:
      - job: BuildJob
        displayName: 'Build Job'
        steps:
          - script: cd ../ 
              ./gradlew :module:javaVersion 
              echo "Running javaVersion's unit tests on itself..."
            displayName: 'Unit tests: javaVersion on Java code'